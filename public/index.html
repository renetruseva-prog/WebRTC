<!DOCTYPE html>
<html>

<head>
  <title>WebRTC Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      padding-top: 50px;
    }

    #qr img {
      margin-top: 20px;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>

  <div id="desktop">
    <h1>Scan to Connect</h1>
    <div id="qr"></div>
  </div>

  <div id="mobile" class="hidden">
    <h1 style="color: rgb(184, 30, 30);">Hello from my phone!</h1>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"></script>
  <script src="/socket.io/socket.io.js"></script>

  <script>
    const socket = io();
    let peerConnection;
    let dataChannel;

    // WebRTC Configuration
    const config = {
      iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
    };

    // --- HELPER FUNCTIONS ---
    function isMobile() {
      return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
    }

    function renderQRCode(url) {
      const typeNumber = 4;
      const errorCorrectionLevel = 'L';
      const qr = qrcode(typeNumber, errorCorrectionLevel);
      qr.addData(url);
      qr.make();
      document.getElementById('qr').innerHTML = qr.createImgTag(4);
    }

    function setupDataChannel(channel) {
      channel.onopen = () => console.log("WebRTC Data Channel is OPEN");
      channel.onmessage = (event) => {
        console.log("Received message:", event.data);
        // Logic to change slides on desktop goes here!
        if (event.data === 'next') console.log("Moving to next slide...");
      };
    }

    // --- CORE LOGIC ---
    const init = async () => {
      if (!isMobile()) {
        setupDesktop();
      } else {
        setupMobile();
      }
    };

    async function setupDesktop() {
      // 1. Get URL and Render QR
      const response = await fetch('/config');
      const data = await response.json();
      renderQRCode(data.url);

      // 2. Prepare WebRTC
      peerConnection = new RTCPeerConnection(config);
      dataChannel = peerConnection.createDataChannel("controls");
      setupDataChannel(dataChannel);

      peerConnection.onicecandidate = (event) => {
        if (event.candidate) socket.emit('candidate', event.candidate);
      };

      const offer = await peerConnection.createOffer();
      await peerConnection.setLocalDescription(offer);
      socket.emit('offer', offer);

      socket.on('answer', async (answer) => {
        await peerConnection.setRemoteDescription(new RTCSessionDescription(answer));
      });
    }

    async function setupMobile() {
      document.getElementById('desktop').classList.add('hidden');
      document.getElementById('mobile').classList.remove('hidden');

      peerConnection = new RTCPeerConnection(config);

      peerConnection.ondatachannel = (event) => {
        dataChannel = event.channel;
        setupDataChannel(dataChannel);
      };

      peerConnection.onicecandidate = (event) => {
        if (event.candidate) socket.emit('candidate', event.candidate);
      };

      socket.on('offer', async (offer) => {
        await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
        const answer = await peerConnection.createAnswer();
        await peerConnection.setLocalDescription(answer);
        socket.emit('answer', answer);
      });
    }

    socket.on('candidate', async (candidate) => {
      try {
        await peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
      } catch (e) { console.error("Error adding ice candidate", e); }
    });

    init();
  </script>
</body>

</html>
