<!DOCTYPE html>
<html>

<head>
  <title>WebRTC Presenter — Phone</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- Shown while waiting for server to accept or reject this phone -->
  <div id="connecting-overlay" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:30px;background:#1a1a2e;">
    <div style="font-size:40px;margin-bottom:16px;">📡</div>
    <p style="color:rgba(255,255,255,0.8);font-size:16px;">Connecting…</p>
  </div>

  <div id="mobile" class="hidden">
    <h1>🎤 Presenter View</h1>
    <div id="presentation-name" style="text-align: center; font-size: 14px; opacity: 0.8; margin-bottom: 10px;">No presentation uploaded</div>

    <!-- Gyroscope Permission Button (iOS 13+) -->
    <button id="request-permission-btn" style="display: none; width: 90%; margin: 10px auto; padding: 10px; background: #4CAF50; color: white; border: none; border-radius: 4px; cursor: pointer; display: none;">
      📱 Enable Gyroscope Control
    </button>

    <!-- Gyroscope Status and Control -->
    <div id="gyro-section" style="margin: 8px 16px; display: none;">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
        <span style="font-size: 14px; font-weight: bold;">🔄 Gyroscope Control</span>
        <button id="gyro-disable-btn" style="padding: 4px 12px; background: #f44336; color: white; border: none; border-radius: 4px; font-size: 12px; cursor: pointer;">
          Disable
        </button>
      </div>
      <div id="gyro-feedback" style="background: rgba(255,255,255,0.08); border-radius: 6px; padding: 12px; text-align: center;">
        <div id="direction-indicator" style="font-size: 24px; margin-bottom: 8px;">📱</div>
        <div id="direction-text" style="font-size: 13px; opacity: 0.8;">Tilt left or right to navigate slides</div>
      </div>
    </div>

    <!-- Camera Control Section -->
    <div style="margin: 8px 16px 4px; border-top: 1px solid rgba(255,255,255,0.15); padding-top: 12px;">
      <button id="toggle-camera-btn" style="width: 100%; padding: 10px; background: #3b82f6; color: white; border: none; border-radius: 4px; font-size: 14px; cursor: pointer; margin-bottom: 8px; transition: background 0.2s;">📹 Enable Camera</button>
    </div>

    <!-- Laser Pointer Section -->
    <div style="margin: 8px 16px 4px; border-top: 1px solid rgba(255,255,255,0.15); padding-top: 12px;">
      <button id="laser-toggle-btn" style="width: 100%; padding: 10px; background: #177b0e; color: white; border: none; border-radius: 4px; font-size: 14px; cursor: pointer; margin-bottom: 8px;">🔴 Activate laser</button>
      <div id="laser-pad" style="display: none; width: 100%; aspect-ratio: 16/9; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); border-radius: 4px; touch-action: none; position: relative;">
        <span style="position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 12px; opacity: 0.4; pointer-events: none;">Touch to aim laser</span>
      </div>
    </div>

    <div class="presenter-container">
      <!-- Speaker Notes Section -->
      <div class="notes-area">
        <div class="notes-label">📝 Speaker Notes</div>
        <div id="speaker-notes">Waiting for notes...</div>
        <div class="current-slide-info" id="slide-info">Slide 1/?</div>
      </div>

      <!-- Slide Navigation -->
      <div class="slide-nav-buttons">
        <button id="prev-slide-btn" title="Previous slide">← Prev</button>
        <button id="next-slide-btn" title="Next slide">Next →</button>
      </div>

      <!-- Timer Section -->
      <div class="timer-container">
        <div class="timer-label">⏱️ Presentation Timer</div>

        <!-- Presentation Duration Settings -->
        <div class="timer-settings" id="timer-settings">
          <div class="setting-row">
            <label for="duration-input">Duration (minutes):</label>
            <input type="number" id="duration-input" min="1" max="180" value="30" style="width: 60px; padding: 4px; border: 1px solid rgba(255,255,255,0.3); background: rgba(255,255,255,0.1); color: white; border-radius: 4px;">
          </div>
          <div class="setting-row">
            <label for="warning1-input">First warning (seconds left):</label>
            <input type="number" id="warning1-input" min="10" max="600" value="60" placeholder="60" style="width: 80px; padding: 4px; border: 1px solid rgba(255,255,255,0.3); background: rgba(255,255,255,0.1); color: white; border-radius: 4px;">
          </div>
          <div class="setting-row">
            <label for="warning2-input">Final warning (seconds left):</label>
            <input type="number" id="warning2-input" min="5" max="300" value="30" placeholder="30" style="width: 80px; padding: 4px; border: 1px solid rgba(255,255,255,0.3); background: rgba(255,255,255,0.1); color: white; border-radius: 4px;">
          </div>
          <div class="setting-hint" style="font-size: 11px; opacity: 0.6; margin-top: 6px; text-align: center;">
            💡 Set custom warning times before your presentation ends
          </div>

          <!-- Test Alert Button -->
          <div style="margin-top: 10px; text-align: center;">
            <button id="test-alert-btn" style="padding: 8px 16px; background: rgba(255, 193, 7, 0.8); color: #333; border: none; border-radius: 4px; font-size: 12px; font-weight: bold; cursor: pointer;">
              🔔 Test Buzz & Vibration
            </button>
          </div>
        </div>

        <div class="timer-display" id="timer-display">Timer: 00:00</div>
        <div class="timer-progress" id="timer-progress-bar" style="display: none;">
          <div class="progress-fill" id="progress-fill"></div>
          <div class="time-remaining" id="time-remaining"></div>
        </div>

        <div class="timer-controls">
          <button class="timer-btn" id="timer-start">Start</button>
          <button class="timer-btn" id="timer-pause" style="display: none;">Pause</button>
          <button class="timer-btn" id="timer-resume" style="display: none;">Resume</button>
          <button class="timer-btn" id="timer-reset">Reset</button>
        </div>

        <!-- Warning Alert Area -->
        <div class="timer-warning" id="timer-warning" style="display: none;">
          <div class="warning-icon">⚠️</div>
          <div class="warning-text" id="warning-text"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Reveal.js CSS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/4.5.0/reveal.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/4.5.0/theme/black.min.css">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/4.5.0/reveal.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/4.5.0/plugin/markdown/markdown.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/4.5.0/plugin/notes/notes.min.js"></script>
  <script src="/socket.io/socket.io.js"></script>

  <!-- Add markdown-it library for markdown parsing -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <!-- Add PDF.js for PDF parsing -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  </script>
  <script type="module" src="script-mobile.js"></script>
</body>

</html>
